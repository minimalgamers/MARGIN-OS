// Nuovo matching: g="*" oppure g=[...nomi build]
function varMatchesBuild(v,buildName){if(v.g==="*")return true;if(!Array.isArray(v.g))return false;return v.g.some(b=>N(b)===N(buildName));}

// CSV parser
function parseCSV(text){const lines=[];let cur="",inQ=false;for(let i=0;i<text.length;i++){const ch=text[i];if(ch==='"')inQ=!inQ;else if(ch==='\n'&&!inQ){lines.push(cur);cur="";}else if(ch==='\r'&&!inQ){}else cur+=ch;}if(cur.trim())lines.push(cur);const split=l=>{const c=[];let s="",q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){c.push(s);s="";}else s+=ch;}c.push(s);return c;};if(lines.length<2)return[];const h=split(lines[0]),idx=k=>h.findIndex(x=>x.trim().toLowerCase()===k.toLowerCase());const iN=idx("Name"),iT=idx("Total"),iD=idx("Created at"),iP=idx("Payment Method"),iLN=idx("Lineitem name"),iLP=idx("Lineitem price");const m={};for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const r=split(lines[i]);const name=(r[iN]||"").trim();if(!name)continue;if(!m[name])m[name]={on:name,dt:(r[iD]||"").substring(0,10),pm:(r[iP]||"").trim(),tot:parseFloat((r[iT]||"0").replace(",","."))||0,li:[]};const ln=(r[iLN]||"").trim();if(ln)m[name].li.push({n:ln,p:parseFloat((r[iLP]||"0").replace(",","."))||0});}return Object.values(m);}

// ═══ MOTORE ANALISI ═══
function analyze(o,vars,accs,custs,builds){
  const r={on:o.on,dt:o.dt,pm:o.pm,tot:o.tot,items:[],anom:[],build:null,cust:null,isCust:false,st:"completo"};
  let bb=null,cb=null,liq=false,ass=false,tc=0,cpu17=0;
  for(const li of o.li){const n=li.n,p=li.p,nn=N(n);
    if(nn.includes("TV")&&nn.includes("POLLICI")){r.items.push({ty:"eccezione",raw:n,sp:p,ic:null,dc:null,bc:null,mg:null,ep:p,mt:"ECCEZIONE MANUALE",lg:"—",cf:"manuale"});r.anom.push({ty:"eccezione_manuale",it:n,sv:"medio"});continue;}
    // Build base — prova PRIMA del custom
    if(!bb&&!cb&&(nn.includes("PC GAMING")||nn.includes("PC "))){
      let bm=null,bestScore=0;
      const isBundle=nn.includes("MONITOR")&&nn.includes("KIT");
      for(const b of builds){
        const bn=N(b.n);
        let sc=0;
        // Match esatto nome nel titolo (es. "BLACKNOVA" nel titolo)
        if(nn.includes(bn))sc+=10+bn.length;
        // Match per parole chiave del nome build
        else{const bw=bn.split(/\s+/).filter(w=>w.length>2);const hits=bw.filter(w=>nn.includes(w)).length;if(bw.length>0)sc+=hits*3;}
        // Bonus prezzo esatto
        if(b.p===p)sc+=20;
        // Bonus/penalità bundle: se il titolo è un bundle, preferisci build con PC+MONITOR+KIT nel nome
        const isBuildBundle=bn.includes("MONITOR")&&bn.includes("KIT");
        if(isBundle&&isBuildBundle)sc+=15;
        if(isBundle&&!isBuildBundle)sc-=10;
        if(!isBundle&&isBuildBundle)sc-=10;
        if(sc>bestScore){bestScore=sc;bm=b;}
      }
      if(bm&&bestScore>=10){bb=bm;r.build=bm.n;tc+=bm.c;cpu17+=bm.cpu;r.items.push({ty:"build",raw:n,sp:p,ic:bm.c,dc:null,bc:null,mg:null,ep:p,mt:bm.n,lg:"—",cf:"alto"});continue;}

    if(!r.ok){const e=await r.json().catch(function(){return{error:"HTTP "+r.status}});throw new Error(e.error||"DB error");}

    setSpeseLog(function(prev){return prev.filter(function(_,j){return j!==i;});});

  };
  // Ordini manuali
  const saveManual=function(){
    const inc=parseFloat(moIncasso)||0;if(!moDesc.trim()||!inc)return;
    const newMo={date:moData,desc:moDesc,incasso:inc,ivaV:moIvaV,costo:parseFloat(moCosto)||0,cpu17:parseFloat(moCpu)||0};
    setManualOrders(function(prev){return[newMo,...prev];});
    setMoDesc("");setMoIncasso("");setMoCosto("");setMoCpu("");
    dbCall("manual_add",{date:moData,description:moDesc,income:inc,iva_rate:moIvaV,product_cost:parseFloat(moCosto)||0,cpu_art17:parseFloat(moCpu)||0}).then(function(r){
      if(r&&r.data&&r.data[0])newMo._id=r.data[0].id;
    }).catch(function(){});
  };
  const deleteManual=function(i){
    const item=manualOrders[i];
    setManualOrders(function(prev){return prev.filter(function(_,j){return j!==i;});});
    if(item&&item._id)dbCall("manual_delete",{id:item._id}).catch(function(){});
  };

  // ADS filtered by period
  const filteredAds=useMemo(()=>{
    const [from,to]=getDateRange(periodo);
    return adsLog.filter(a=>a.date>=from&&a.date<=to);
  },[adsLog,periodo,dateFrom,dateTo]);
  const filteredSpese=useMemo(()=>{const [f,t]=getDateRange(periodo);return speseLog.filter(s=>s.date>=f&&s.date<=t);},[speseLog,periodo,dateFrom,dateTo]);
  const filteredManual=useMemo(()=>{const [f,t]=getDateRange(periodo);return manualOrders.filter(m=>m.date>=f&&m.date<=t);},[manualOrders,periodo,dateFrom,dateTo]);

  const stats=useMemo(()=>{const list=filteredAna;
    const tr=list.reduce((s,a)=>s+a.tot,0);
    const tCostiInt=list.reduce((s,a)=>s+(a.tc||0),0);
    const tFees=list.reduce((s,a)=>s+(a.fees||0),0);
    const tw=list.reduce((s,a)=>s+(a.asm||0),0);
    const td=list.length*S.ship;
    // ADS totals
    const adsTT=filteredAds.reduce((s,a)=>s+(a.tiktok||0),0);
    const adsMT=filteredAds.reduce((s,a)=>s+(a.meta||0),0);
    const adsTotal=adsTT+adsMT;
    // Spese extra
    const speseIva=filteredSpese.filter(s=>s.iva);
    const speseNoIva=filteredSpese.filter(s=>!s.iva);
    const spTotIva=speseIva.reduce((s,x)=>s+x.importo,0); // importo IVA inclusa
    const spNettoIva=spTotIva/1.22; // costo netto
    const spIvaDetr=spTotIva-spNettoIva; // IVA detraibile
    const spTotNoIva=speseNoIva.reduce((s,x)=>s+x.importo,0); // senza IVA = costo pieno deducibile, no IVA
    const spTotNetto=spNettoIva+spTotNoIva; // totale costi netti
    // Ordini manuali (con IVA variabile 22% o 4%)
    const moTotIncasso=filteredManual.reduce((s,m)=>s+m.incasso,0);
    const moNetRev=filteredManual.reduce((s,m)=>s+m.incasso/(1+m.ivaV/100),0);
    const moVatSale=filteredManual.reduce((s,m)=>s+(m.incasso-m.incasso/(1+m.ivaV/100)),0);
    const moTotCosto=filteredManual.reduce((s,m)=>s+m.costo,0);
    const moNetCosto=filteredManual.reduce((s,m)=>s+m.costo/1.22,0);
    const moTotCpu17=filteredManual.reduce((s,m)=>s+(m.cpu17||0),0);
    const moCostoOrd=filteredManual.reduce((s,m)=>s+(m.costo-(m.cpu17||0)),0);
    const moVatDetr=filteredManual.reduce((s,m)=>{const noArt=m.costo-(m.cpu17||0);return s+(noArt-noArt/1.22);},0);
    const moShip=filteredManual.length*S.ship;
    // Pro-rata affitto + commercialista
    const [from,to]=getDateRange(periodo);
    const d1=new Date(from),d2=new Date(to);
    const giorni=Math.max(1,Math.round((d2-d1)/(1000*60*60*24))+1);
    const giorniMese=new Date(d2.getFullYear(),d2.getMonth()+1,0).getDate();
    const affittoQ=periodo==="tutto"?0:Math.round((S.affittoNetto/giorniMese*giorni)*100)/100;
    const affittoIvaQ=periodo==="tutto"?0:Math.round((S.affittoIVA/giorniMese*giorni)*100)/100;
    const commQ=periodo==="tutto"?0:Math.round((S.commNetto/giorniMese*giorni)*100)/100;
    const commIvaQ=periodo==="tutto"?0:Math.round((S.commIVA/giorniMese*giorni)*100)/100;
    // Abbonamenti (inversione contabile = zero IVA, puro costo deducibile)
    const abbonTotMese=calcAbbon(abbon,usdRate);
    const abbonQ=periodo==="tutto"?0:Math.round((abbonTotMese/giorniMese*giorni)*100)/100;
    // Totali COMPLETI
    const trTot=tr+moTotIncasso;
    const feesTot=tFees; // manuali = bonifico, zero commissioni
    const tdTot=td+moShip; // DHL anche per manuali
    // Calcoli aggregati
    const netRev=tr/1.22+moNetRev;
    const netCost=tCostiInt/1.22+moNetCosto;
    const utLordo=netRev-netCost-feesTot-tw-tdTot-affittoQ-commQ-abbonQ-adsTotal-spTotNetto;
    const imposte=Math.max(0,utLordo*S.taxR);
    const profittoReale=utLordo-imposte;
    // IVA
    const vatSale=(tr-(tr/1.22))+moVatSale;
    const tCpu17=list.reduce((s,a)=>s+(a.cpu17||0),0);
    const ordVAT=tCostiInt-tCpu17;
    const dedVAT=(ordVAT-(ordVAT/1.22))+moVatDetr+affittoIvaQ+commIvaQ+spIvaDetr;
    const vatAside=vatSale-dedVAT;
    const an=list.reduce((s,a)=>s+a.anom.length,0);
    const bp={};list.forEach(a=>{const n=a.build||a.cust||"?";if(!bp[n])bp[n]={t:0,c:0};bp[n].t+=a.postTax||0;bp[n].c++;});
    filteredManual.forEach(m=>{const n="Manuale";if(!bp[n])bp[n]={t:0,c:0};bp[n].t+=m.incasso/(1+m.ivaV/100)-m.costo/1.22;bp[n].c++;});
    return{cnt:list.length+filteredManual.length,tr:trTot,tCostiInt,tFees:feesTot,tw,td:tdTot,adsTT,adsMT,adsTotal,spTotNetto,spIvaDetr,spTotIva,spTotNoIva,affittoQ,affittoIvaQ,commQ,commIvaQ,abbonQ,giorni,netRev,netCost,utLordo,imposte,profittoReale,vatSale,dedVAT,vatAside,an,nManual:filteredManual.length,moTotIncasso,top:Object.entries(bp).map(([n,d])=>({n,t:d.t,c:d.c})).sort((a,b)=>b.t-a.t)};
  },[filteredAna,filteredAds,filteredSpese,filteredManual,periodo,dateFrom,dateTo]);
  const reanalyze=useCallback((v,a,c,b)=>{setAnaList(prev=>{const ords=prev.map(p=>({on:p.on,dt:p.dt,pm:p.pm,tot:p.tot,li:p.items.map(i=>({n:i.raw,p:i.sp}))}));return ords.map(o=>analyze(o,v||vars,a||accs,c||custs,b||builds));});},[vars,accs,custs,builds]);
  const handleUpload=f=>{const reader=new FileReader();reader.onload=e=>{try{const orders=parseCSV(e.target.result);if(!orders.length){setUploadSt({ok:false,msg:"Nessun ordine trovato"});return;}const newAna=orders.map(o=>analyze(o,vars,accs,custs,builds));const existing=new Set(anaList.map(a=>a.on));const fresh=newAna.filter(a=>!existing.has(a.on));const dupes=newAna.length-fresh.length;if(fresh.length>0)setAnaList(prev=>[...fresh,...prev]);setUploadSt({ok:true,msg:`${fresh.length} nuovi ordini analizzati${dupes>0?` (${dupes} duplicati saltati)`:""}`});}catch(err){setUploadSt({ok:false,msg:"Errore: "+err.message});}};reader.readAsText(f,"latin1");};

  const updateVar=(i,f,v)=>{setVars(p=>{const n=[...p];n[i]={...n[i],[f]:v};return n;});};
  const addVar=()=>{if(!newVar.v.trim())return;setVars(p=>[...p,{...newVar}]);setNewVar({t:"CASE",v:"",ep:0,l:"S",ic:0,bc:40.17,g:"*"});setShowAddVar(false);};
  const deleteVar=i=>{setVars(p=>p.filter((_,j)=>j!==i));};
  const updateAcc=(i,f,v)=>{setAccs(p=>{const n=[...p];n[i]={...n[i],[f]:v};return n;});};
  const addAcc=()=>{if(!newAcc.nm.trim())return;setAccs(p=>[...p,{...newAcc,k:newAcc.nm.toUpperCase().replace(/\s+/g,"_")}]);setNewAcc({k:"",nm:"",sp:0,ic:0});setShowAddAcc(false);};
  const deleteAcc=i=>{setAccs(p=>p.filter((_,j)=>j!==i));};
  const updateBuild=(i,f,v)=>{setBuilds(p=>{const n=[...p];n[i]={...n[i],[f]:v};return n;});};
  const addBuild=()=>{if(!newBuild.n.trim())return;setBuilds(p=>[...p,{...newBuild}]);setNewBuild({n:"",c:0,p:0,cpu:0});setShowAddBuild(false);};
  const deleteBuild=i=>{setBuilds(p=>p.filter((_,j)=>j!==i));};
  const updateCust=(i,f,v)=>{setCusts(p=>{const n=[...p];n[i]={...n[i],[f]:v};return n;});};
  const addCust=()=>{if(!newCust.inn.trim())return;setCusts(p=>[...p,{...newCust,sm:newCust.sm||`[CUSTOM] ${newCust.inn}`}]);setNewCust({sm:"",inn:"",a17:true,tc:0,ca:0,at:"ASSASSIN"});setShowAddCust(false);};
  const deleteCust=i=>{setCusts(p=>p.filter((_,j)=>j!==i));};
  const updateAbbon=function(i,f,v){setAbbon(function(p){const n=[...p];n[i]={...n[i],[f]:v};if(n[i]._id)dbCall("subscription_update",{id:n[i]._id,data:{[f==="costo"?"cost":f==="nome"?"name":f==="valuta"?"currency":f==="freq"?"frequency":f]:v}}).catch(function(){});return n;});};
  const addAbbon=function(){if(!newAbbon.nome.trim()||!newAbbon.costo)return;const na={...newAbbon};setAbbon(function(p){return[...p,na];});setNewAbbon({nome:"",costo:0,valuta:"EUR",freq:"mese"});setShowAddAbbon(false);dbCall("subscription_add",{name:na.nome,cost:na.costo,currency:na.valuta,frequency:na.freq}).then(function(r){if(r&&r.data&&r.data[0])na._id=r.data[0].id;}).catch(function(){});};
  const deleteAbbon=function(i){const item=abbon[i];setAbbon(function(p){return p.filter(function(_,j){return j!==i;});});if(item&&item._id)dbCall("subscription_delete",{id:item._id}).catch(function(){});};

  const filteredVars=vars.map((v,i)=>({...v,_i:i})).filter(v=>!dbFilter||N(v.t+v.v).includes(N(dbFilter)));
  const nav=[["dash","Dashboard"],["orders","Ordini"],["import","Sincronizza"],["db","Database"],["anom","Anomalie"]];
  const stC=s=>s==="completo"?"green":s==="parziale"?"amber":"red";

  if(loading)return <div className="min-h-screen bg-zinc-950 flex items-center justify-center"><div className="text-center"><div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-sm font-black text-black mx-auto mb-3">MG</div><div className="text-zinc-500 text-xs">Caricamento dati...</div></div></div>;

  return(<div className="min-h-screen bg-zinc-950 text-zinc-100" style={{fontFamily:"ui-monospace,monospace"}}>
    <div className="border-b border-zinc-800 bg-zinc-900/80 px-4 py-3 flex items-center gap-4 flex-wrap">
      <div className="flex items-center gap-2"><div className="w-7 h-7 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-[10px] font-black text-black">MG</div><div className="text-sm font-bold tracking-tight">MARGIN OS</div><div className="text-[9px] text-zinc-600 tracking-widest">MINIMAL GAMERS</div></div>
      <div className="flex gap-1 ml-4">{nav.map(([id,lb])=><button key={id} onClick={()=>{setPg(id);setSel(null);}} className={`px-3 py-1 rounded text-xs font-semibold transition ${pg===id?"bg-zinc-800 text-white":"text-zinc-500 hover:text-zinc-300"}`}>{lb}{id==="anom"&&stats.an>0&&<span className="ml-1 text-[10px] text-rose-400">({stats.an})</span>}</button>)}</div></div>
    <div className="max-w-6xl mx-auto p-4 space-y-4">

    {pg==="dash"&&<><h1 className="text-lg font-bold mt-2">Dashboard</h1>
      <div className="flex items-center gap-2 flex-wrap">
        {[["oggi","Oggi"],["ieri","Ieri"],["7gg","7 Giorni"],["30gg","30 Giorni"],["mese","Mese Corrente"],["tutto","Tutto"],["custom","Date..."]].map(([k,l])=>
          <button key={k} onClick={()=>setPeriodo(k)} className={`px-3 py-1 rounded text-xs font-semibold transition ${periodo===k?"bg-emerald-600 text-white":"bg-zinc-800 text-zinc-400 hover:text-zinc-200"}`}>{l}</button>)}
        {periodo==="custom"&&<div className="flex items-center gap-2">
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300"/>
          <span className="text-zinc-600 text-xs">→</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300"/>
        </div>}
        <span className="text-[10px] text-zinc-600 ml-auto">{stats.cnt} ordini nel periodo</span>
      </div>
      <div className="grid grid-cols-4 gap-2">{[[stats.cnt,"Ordini","text-blue-400","border-blue-800"],[fmt(stats.tr),"Fatturato","text-purple-400","border-purple-800"],[fmt(stats.profittoReale),"Profitto Reale Netto","text-emerald-400","border-emerald-800"],[fmt(stats.vatAside),"IVA da Versare","text-amber-400","border-amber-800"]].map(([v,l,tc,bc],i)=><div key={i} className={`rounded-lg border ${bc} bg-zinc-900/60 p-3`}><div className="text-[9px] font-bold tracking-widest uppercase text-zinc-500">{l}</div><div className={`text-base font-bold mt-1 ${tc}`}>{v}</div></div>)}</div>

            {stats.affittoQ>0&&<div className="flex justify-between"><span className="text-zinc-500 pl-2">Affitto locale (netto){periodo!=="mese"&&stats.giorni<28?` — ${stats.giorni}gg pro-rata`:""}</span><span className="text-rose-400">−{fmt(stats.affittoQ)}</span></div>}
            {stats.commQ>0&&<div className="flex justify-between"><span className="text-zinc-500 pl-2">Commercialista (netto){periodo!=="mese"&&stats.giorni<28?` — ${stats.giorni}gg pro-rata`:""}</span><span className="text-rose-400">−{fmt(stats.commQ)}</span></div>}
            {stats.abbonQ>0&&<div className="flex justify-between"><span className="text-zinc-500 pl-2">Abbonamenti software{periodo!=="mese"&&stats.giorni<28?` — ${stats.giorni}gg pro-rata`:""}</span><span className="text-rose-400">−{fmt(stats.abbonQ)}</span></div>}</>}
            <div className="flex justify-between border-t border-zinc-800 pt-2 mt-2"><span className="text-zinc-200 font-bold">Utile Lordo</span><span className={`font-bold ${stats.utLordo>=0?"text-zinc-200":"text-rose-400"}`}>{fmt(stats.utLordo)}</span></div>
            <div className="flex justify-between"><span className="text-rose-400 pl-2">Imposte da accantonare (30%)</span><span className="text-rose-400">−{fmt(stats.imposte)}</span></div>
            <div className="flex justify-between border-t border-zinc-800 pt-2 mt-2"><span className="text-emerald-400 font-bold text-sm">PROFITTO REALE NETTO</span><span className={`font-black text-sm ${stats.profittoReale>=0?"text-emerald-400":"text-rose-400"}`}>{fmt(stats.profittoReale)}</span></div>
          </div>
          <div className="space-y-1.5 text-xs">
            <div className="text-[10px] font-bold text-zinc-400 uppercase mb-1">Accantonamenti del Periodo</div>
            <div className="flex justify-between"><span className="text-zinc-500">IVA sulla vendita</span><span>{fmt(stats.vatSale)}</span></div>
            <div className="flex justify-between"><span className="text-zinc-500">IVA acquisti detraibile</span><span className="text-emerald-400">−{fmt(stats.dedVAT)}</span></div>
            {(stats.affittoIvaQ>0||stats.commIvaQ>0||stats.spIvaDetr>0)&&<div className="flex justify-between"><span className="text-zinc-600 pl-2 text-[10px]">(include IVA: {[stats.affittoIvaQ>0&&`affitto ${fmt(stats.affittoIvaQ)}`,stats.commIvaQ>0&&`comm.sta ${fmt(stats.commIvaQ)}`,stats.spIvaDetr>0&&`spese ${fmt(stats.spIvaDetr)}`].filter(Boolean).join(" + ")})</span></div>}
            <div className="flex justify-between border-t border-zinc-800 pt-1.5 mt-1.5"><span className="text-amber-400 font-semibold">IVA da versare</span><span className="font-bold text-amber-400">{fmt(stats.vatAside)}</span></div>
            <div className="flex justify-between mt-3"><span className="text-rose-400 font-semibold">Imposte da accantonare</span><span className="font-bold text-rose-400">{fmt(stats.imposte)}</span></div>
            <div className="flex justify-between"><span className="text-orange-400 font-semibold">Da dare a William</span><span className="font-bold text-orange-400">{fmt(stats.tw)}</span></div>
            <div className="flex justify-between"><span className="text-sky-400 font-semibold">Da dare a DHL</span><span className="font-bold text-sky-400">{fmt(stats.td)}</span></div>
            {stats.adsTotal>0&&<><div className="flex justify-between"><span className="text-pink-400 font-semibold">ADS TikTok</span><span className="font-bold text-pink-400">{fmt(stats.adsTT)}</span></div>
            <div className="flex justify-between"><span className="text-indigo-400 font-semibold">ADS Meta</span><span className="font-bold text-indigo-400">{fmt(stats.adsMT)}</span></div></>}

            {stats.abbonQ>0&&<div className="flex justify-between"><span className="text-zinc-400 font-semibold">Abbonamenti software</span><span className="font-bold text-zinc-400">{fmt(stats.abbonQ)}</span></div>}
            {stats.spTotNetto>0&&<div className="flex justify-between"><span className="text-zinc-400 font-semibold">Spese extra{stats.spIvaDetr>0?` (netto+IVA)`:""}</span><span className="font-bold text-zinc-400">{fmt(stats.spTotIva+stats.spTotNoIva)}</span></div>}
            <div className="flex justify-between border-t border-zinc-800 pt-2 mt-2"><span className="text-zinc-300 font-bold">Totale da Accantonare</span><span className="font-bold text-zinc-200">{fmt(stats.vatAside+stats.imposte+stats.tw+stats.td+stats.adsTotal+stats.abbonQ+stats.spTotIva+stats.spTotNoIva+(stats.affittoQ?stats.affittoQ+stats.affittoIvaQ:0)+(stats.commQ?stats.commQ+stats.commIvaQ:0))}</span></div>
            <div className="flex justify-between border-t border-zinc-800 pt-2 mt-3"><span className="text-emerald-400 font-bold text-sm">TI RESTA IN TASCA</span><span className={`font-black text-sm ${stats.profittoReale>=0?"text-emerald-400":"text-rose-400"}`}>{fmt(stats.profittoReale)}</span></div>
          </div>
        </div>
      </div>

        <div className="flex items-end gap-3 flex-wrap">
          <div><label className="text-[10px] text-zinc-500 block mb-1">Data</label>

            <div className="flex items-end"><button onClick={saveManual} className="w-full px-3 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-semibold transition">✓ Salva Ordine</button></div>

            <div><label className="text-[10px] text-zinc-500 block mb-1">Nome Servizio</label><input value={newAbbon.nome} onChange={e=>setNewAbbon(p=>({...p,nome:e.target.value}))} placeholder="es. Midjourney" className="w-full bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-emerald-600"/></div>
            <div><label className="text-[10px] text-zinc-500 block mb-1">Costo</label><input type="number" step="0.01" value={newAbbon.costo||""} onChange={e=>setNewAbbon(p=>({...p,costo:parseFloat(e.target.value)||0}))} className="w-full bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5 text-xs text-right focus:outline-none focus:border-emerald-600"/></div>
            <div><label className="text-[10px] text-zinc-500 block mb-1">Valuta</label><select value={newAbbon.valuta} onChange={e=>setNewAbbon(p=>({...p,valuta:e.target.value}))} className="w-full bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5 text-xs"><option value="EUR">EUR (€)</option><option value="USD">USD ($)</option></select></div>
            <div><label className="text-[10px] text-zinc-500 block mb-1">Frequenza</label><select value={newAbbon.freq} onChange={e=>setNewAbbon(p=>({...p,freq:e.target.value}))} className="w-full bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5 text-xs"><option value="mese">Mensile</option><option value="trimestre">Trimestrale</option><option value="anno">Annuale</option></select></div>
          </div>
          <button onClick={addAbbon} className="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-semibold transition">✓ Aggiungi</button>
        </div>}
        <div className="rounded-lg border border-zinc-800 bg-zinc-900/50 overflow-x-auto"><table className="w-full text-[11px]"><thead><tr className="border-b border-zinc-800 text-zinc-500 uppercase text-[9px]">
          <th className="p-1.5 w-6"></th><th className="text-left p-1.5">Servizio</th><th className="text-right p-1.5">Costo</th><th className="p-1.5">Valuta</th><th className="p-1.5">Frequenza</th><th className="text-right p-1.5 text-emerald-400">€/mese</th>
        </tr></thead><tbody>{abbon.map((a,i)=>{const eur=a.valuta==="USD"?a.costo*usdRate:a.costo;const mese=a.freq==="mese"?eur:a.freq==="trimestre"?eur/3:eur/12;
          return <tr key={i} className="border-b border-zinc-800/30 group">
            <td className="p-1 text-center"><button onClick={()=>deleteAbbon(i)} className="text-zinc-700 hover:text-rose-400 transition opacity-0 group-hover:opacity-100 text-[10px]">🗑</button></td>
            <td className="p-1.5 font-semibold text-zinc-300">{a.nome}</td>
            <td className="p-1.5 text-right"><InlineEdit val={a.costo} onSave={v=>updateAbbon(i,"costo",v)}/></td>
            <td className="p-1.5 text-zinc-500 text-[10px]">{a.valuta}</td>
            <td className="p-1.5 text-zinc-500 text-[10px]">{a.freq==="mese"?"Mensile":a.freq==="trimestre"?"Trim.":"Annuale"}</td>
            <td className="p-1.5 text-right text-emerald-400 font-semibold">{fmt(mese)}</td>
          </tr>;})}
        </tbody><tfoot><tr className="border-t border-zinc-700"><td></td><td className="p-1.5 font-bold text-zinc-400">Totale Mensile</td><td></td><td></td><td></td><td className="p-1.5 text-right font-black text-emerald-400">{fmt(calcAbbon(abbon,usdRate))}</td></tr></tfoot>
        </table></div>
      </>}</>}

    {pg==="anom"&&<><h1 className="text-lg font-bold mt-2">Anomalie</h1>{(()=>{const all=anaList.flatMap(a=>a.anom.map(an=>({...an,o:a.on})));return all.length===0?<p className="text-zinc-500 text-sm text-center py-8">Nessuna anomalia rilevata</p>:<div className="rounded-lg border border-zinc-800 bg-zinc-900/50 overflow-x-auto"><table className="w-full text-xs"><thead><tr className="border-b border-zinc-800 text-zinc-500 uppercase text-[10px]"><th className="text-left p-2">Ordine</th><th className="text-left p-2">Tipo</th><th className="text-left p-2">Gravità</th><th className="text-left p-2">Elemento</th></tr></thead><tbody>{all.map((a,i)=><tr key={i} className="border-b border-zinc-800/40"><td className="p-2 font-semibold">{a.o}</td><td className="p-2"><Badge text={a.ty.replace(/_/g," ")} color={a.ty.includes("sconosciut")?"red":"amber"}/></td><td className="p-2"><Badge text={a.sv} color={a.sv==="critico"||a.sv==="alto"?"red":"amber"}/></td><td className="p-2 text-zinc-400 max-w-md truncate">{a.it}</td></tr>)}</tbody></table></div>;})()}</>}

    </div></div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
